name: Materialization Automation

on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]

permissions:
  contents: read
  id-token: write
  issues: write

# ================================================================
#  JOB 1 - GENERATE SQL
# ================================================================
jobs:
  generate:
    name: "Generate SQL"
    if: >-
      github.event_name == 'issues' &&
      contains(github.event.issue.labels.*.name, 'type:materialization')
    runs-on: ubuntu-latest

    steps:
      - name: Parse issue form
        id: parse
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.issue.body;

            function extract(label) {
              const re = new RegExp(`###\\s*${label}\\s*\\n\\n([^#]*?)(?=\\n###|$)`, 'is');
              const m = body.match(re);
              return m ? m[1].trim() : '';
            }

            function stripCodeFence(text) {
              return text
                .replace(/^```(?:sql)?\s*\n?/i, '')
                .replace(/\n?```\s*$/i, '')
                .trim();
            }

            const pipeline    = extract('Pipeline Type');
            const reqType     = extract('Request Type');
            const stageObj    = extract('Source\\/Stage Object Name');
            const coreObj     = extract('Core\\/Target Object Name');
            const srcCol      = extract('Source Type Column Name');
            const pks         = extract('Primary Keys');
            const stageProj   = extract('Stage Project Name');
            const targetProj  = extract('Target Project Name');
            const matProj     = extract('Materialization Project');

            const colMappingsRaw = extract('Column Mappings');
            const etlViewRaw     = extract('ETL View SQL');
            const colMappings    = stripCodeFence(colMappingsRaw);
            const etlViewSql     = stripCodeFence(etlViewRaw);

            const sourceSection = extract('Select the required source type');
            const checked = sourceSection.match(/- \[[xX]\] (.+)/g) || [];
            const sourceTypes = checked.map(i => i.replace(/- \[[xX]\] /, '').trim()).join(',');

            if (!stageObj)    { core.setFailed('Source/Stage object name is missing'); return; }
            if (!sourceTypes) { core.setFailed('No source types selected');            return; }

            // Validate ETL input by pipeline type
            const sfdc_pipelines = ['Stage SFDC -> SFDC Core', 'Source -> Stage SFDC'];
            if (sfdc_pipelines.includes(pipeline) && !etlViewSql) {
              core.setFailed(`SFDC pipelines require a full ETL View SQL — Column Mappings are not supported for ${pipeline}`);
              return;
            }
            const stage_core_sap = pipeline === 'Stage -> Core';
            if (stage_core_sap && !colMappings && !etlViewSql) {
              core.setFailed('Stage -> Core requires either Column Mappings or ETL View SQL');
              return;
            }

            core.setOutput('pipeline',       pipeline);
            core.setOutput('request_type',   reqType);
            core.setOutput('stage_obj',      stageObj);
            core.setOutput('core_obj',       coreObj || '');
            core.setOutput('src_col',        srcCol);
            core.setOutput('pks',            pks);
            core.setOutput('source_types',   sourceTypes);
            core.setOutput('stage_proj',     stageProj);
            core.setOutput('target_proj',    targetProj);
            core.setOutput('mat_proj',       matProj);
            core.setOutput('col_mappings',   colMappings);
            core.setOutput('etl_view_sql',   etlViewSql);

      # ----------------------------------------------------------------
      #  Generate SQL — branches per pipeline type
      # ----------------------------------------------------------------
      - name: Generate SQL
        id: gen
        uses: actions/github-script@v7
        env:
          PIPELINE:     ${{ steps.parse.outputs.pipeline }}
          REQ_TYPE:     ${{ steps.parse.outputs.request_type }}
          STAGE_OBJ:    ${{ steps.parse.outputs.stage_obj }}
          CORE_OBJ:     ${{ steps.parse.outputs.core_obj }}
          SRC_COL:      ${{ steps.parse.outputs.src_col }}
          PKS:          ${{ steps.parse.outputs.pks }}
          SOURCES:      ${{ steps.parse.outputs.source_types }}
          STAGE_PROJ:   ${{ steps.parse.outputs.stage_proj }}
          TARGET_PROJ:  ${{ steps.parse.outputs.target_proj }}
          MAT_PROJ:     ${{ steps.parse.outputs.mat_proj }}
          COL_MAPPINGS: ${{ steps.parse.outputs.col_mappings }}
          ETL_VIEW_SQL: ${{ steps.parse.outputs.etl_view_sql }}
        with:
          script: |
            const fs = require('fs');

            const PIPELINE    = process.env.PIPELINE    || '';
            const REQ_TYPE    = process.env.REQ_TYPE    || '';
            const STAGE_OBJ   = process.env.STAGE_OBJ   || '';
            const CORE_OBJ    = process.env.CORE_OBJ    || '';
            const SRC_COL     = process.env.SRC_COL     || '';
            const PKS         = process.env.PKS         || '';
            const SOURCES     = process.env.SOURCES     || '';
            const STAGE_PROJ  = process.env.STAGE_PROJ  || '';
            const TARGET_PROJ = process.env.TARGET_PROJ || '';
            const MAT_PROJ    = process.env.MAT_PROJ    || '';
            const MAPPINGS    = process.env.COL_MAPPINGS || '';
            const ETL_SQL     = process.env.ETL_VIEW_SQL || '';

            const SRC_ARR    = SOURCES.split(',').map(s => s.trim()).filter(Boolean);
            const pkList     = PKS.split(',').map(k => k.trim());
            const PK_FMT     = "\"['" + pkList.join("','") + "']\"";
            const srcListStr = "[" + SRC_ARR.map(s => `'${s}'`).join(',') + "]";

            // ── Input mode ──────────────────────────────────────────
            // MAPPINGS = user gave column mappings → auto-generate the view
            // ETL_SQL  = user gave full SQL → use as-is
            const USE_MAPPINGS = !!MAPPINGS.trim() && !ETL_SQL.trim();
            const rawMappingLines = MAPPINGS.split('\n').filter(l => l.trim());

            // ── Reorder mapping lines: PKs first, then remaining ────
            // Each mapping line looks like: source_col AS alias
            // Match alias (after AS) against pkList to determine order
            function reorderMappings(lines, pkColumns, srcColName) {
              const parsed = lines.map(l => {
                const cleaned = l.trim().replace(/,\s*$/, ''); // strip trailing comma
                const asMatch = cleaned.match(/\bAS\s+(\S+)\s*$/i);
                const alias = asMatch ? asMatch[1].trim() : '';
                return { line: cleaned, alias };
              });

              // Separate into: PK columns (excluding src_col), src_col itself, and non-PK
              const pkSet = new Set(pkColumns.map(k => k.toLowerCase()));
              const srcColLower = srcColName.toLowerCase();

              const pkMappings = [];
              const nonPkMappings = [];

              for (const p of parsed) {
                const aliasLower = p.alias.toLowerCase();
                // Skip if it matches the source type column — it's auto-added
                if (aliasLower === srcColLower) continue;
                if (pkSet.has(aliasLower)) {
                  pkMappings.push(p);
                } else {
                  nonPkMappings.push(p);
                }
              }

              // Order PK mappings in the same order as pkList
              const orderedPk = [];
              for (const pk of pkColumns) {
                if (pk.toLowerCase() === srcColLower) continue;
                const found = pkMappings.find(p => p.alias.toLowerCase() === pk.toLowerCase());
                if (found) orderedPk.push(found);
              }

              return [...orderedPk, ...nonPkMappings];
            }

            const mappingLines = reorderMappings(rawMappingLines, pkList, SRC_COL);

            // ── Dataset name constants ──────────────────────────────
            // SAP Stage side (_eu suffix)
            const S_ETL_V  = 'stage_eu_etl_v';
            const S_DS     = 'stage_eu';
            const S_META_T = 'metadata_eu_t';
            const S_META_V = 'metadata_eu_etl_v';
            const S_DML    = 'etl_dml_eu';

            // Core side (no suffix)
            const C_ETL_V  = 'core_etl_v';
            const C_DS     = 'core_t';
            const C_CTRL   = 'ctrl';
            const C_META_T = 'metadata_t';
            const C_META_V = 'metadata_etl_v';
            const C_DML    = 'etl_dml';
            const C_TEMP   = 'core_temp_t';

            // SFDC Stage side
            const SF_ETL_V  = 'sfdc_etl_v';
            const SF_DS     = 'sfdc_stage';
            const SF_META_T = 'metadata_t';
            const SF_META_V = 'metadata_etl_v';
            const SF_DML    = 'etl_dml';

            // ── SQL builder helpers ─────────────────────────────────
            let sql = '';
            const line  = s  => { sql += s + '\n'; };
            const blank = () => { sql += '\n'; };
            let stepNum = 0;
            const header = title => {
              stepNum++;
              line('-- =======================');
              line(`-- STEP ${stepNum}: ${title}`);
              line('-- =======================');
              blank();
            };

            // ── Emit reordered mapping columns ──────────────────────
            // Writes PK columns first, then source type col, then rest
            function emitMappingColumns(indent) {
              const pfx = indent || '  ';
              // PK columns (already ordered by reorderMappings)
              const pkSet = new Set(pkList.map(k => k.toLowerCase()));
              const srcColLower = SRC_COL.toLowerCase();
              const pkLines = mappingLines.filter(m => pkSet.has(m.alias.toLowerCase()) && m.alias.toLowerCase() !== srcColLower);
              const nonPkLines = mappingLines.filter(m => !pkSet.has(m.alias.toLowerCase()));

              // Emit PK columns
              for (const m of pkLines) {
                line(`${pfx}${m.line},`);
              }
            }

            // ── Auto-generate helpers per pipeline ──────────────────

            // Helper to emit all columns in correct order: PKs, src_col, non-PKs
            function emitOrderedColumns(src) {
              const pkSet = new Set(pkList.map(k => k.toLowerCase()));
              const srcColLower = SRC_COL.toLowerCase();
              const pkLines = mappingLines.filter(m => pkSet.has(m.alias.toLowerCase()));
              const nonPkLines = mappingLines.filter(m => !pkSet.has(m.alias.toLowerCase()));

              for (const m of pkLines) {
                line(`  ${m.line},`);
              }
              line(`  '${src}' AS ${SRC_COL},`);
              for (let i = 0; i < nonPkLines.length; i++) {
                const isLast = (i === nonPkLines.length - 1);
                if (isLast) {
                  line(`  ${nonPkLines[i].line},`);
                } else {
                  line(`  ${nonPkLines[i].line},`);
                }
              }
              line('  action_type,');
              line('  row_insert_timestamp,');
              line('  row_update_timestamp');
            }

            // (A) Source -> Stage (SAP)
            function genSourceToStageView() {
              line(`CREATE OR REPLACE VIEW \`${STAGE_PROJ}.${S_ETL_V}.${STAGE_OBJ}\` AS`);
              SRC_ARR.forEach((src, idx) => {
                if (idx > 0) { blank(); line('UNION ALL'); blank(); }
                line('SELECT');
                emitOrderedColumns(src);
                line('FROM');
                line(`  \`${STAGE_PROJ}.sap_${src}_raw.${STAGE_OBJ}\``);
              });
              line(';');
            }

            // (B) Stage -> Core (SAP)
            function genStageToCoreView() {
              line(`CREATE OR REPLACE VIEW \`${TARGET_PROJ}.${C_ETL_V}.${CORE_OBJ}_base\` AS`);
              SRC_ARR.forEach((src, idx) => {
                if (idx > 0) { blank(); line('UNION ALL'); blank(); }
                line('SELECT');
                emitOrderedColumns(src);
                line('FROM');
                line(`  \`${STAGE_PROJ}.sap_${src}_df_etl_v.${STAGE_OBJ}\``);
              });
              line(';');
            }

            // (C) Source -> Stage SFDC
            function genSourceToStageSfdcView() {
              line(`CREATE OR REPLACE VIEW \`${STAGE_PROJ}.${SF_ETL_V}.${STAGE_OBJ}\` AS`);
              SRC_ARR.forEach((src, idx) => {
                if (idx > 0) { blank(); line('UNION ALL'); blank(); }
                line('SELECT');
                emitOrderedColumns(src);
                line('FROM');
                line(`  \`${STAGE_PROJ}.sfdc_${src}_raw.${STAGE_OBJ}\``);
              });
              line(';');
            }

            // (D) Stage SFDC -> SFDC Core
            function genStageSfdcToCoreView() {
              line(`CREATE OR REPLACE VIEW \`${TARGET_PROJ}.${C_ETL_V}.${CORE_OBJ}\` AS`);
              SRC_ARR.forEach((src, idx) => {
                if (idx > 0) { blank(); line('UNION ALL'); blank(); }
                line('SELECT');
                emitOrderedColumns(src);
                line('FROM');
                line(`  \`${STAGE_PROJ}.${SF_ETL_V}.${STAGE_OBJ}\``);
                line(`WHERE ${SRC_COL} = '${src}'`);
              });
              line(';');
            }

            // ── Enhancement cleanup block (reusable) ─────────────────
            function emitCleanup(etlV, obj, proj, metaT, ctrlDs) {
              line('-- =======================');
              line('-- CLEANUP (Enhancement)');
              line('-- =======================');
              blank();
              for (const src of SRC_ARR) {
                line(`DROP VIEW IF EXISTS \`${proj}.${etlV}.${obj}_${src}\`;`);
              }
              blank();
              if (REQ_TYPE === 'Enhancement - Extend/Add Source' ||
                  REQ_TYPE === 'Enhancement - Add New Columns') {
                line(`DROP TABLE IF EXISTS \`${proj}.${C_TEMP}.${obj}\`;`);
                line('-- NOTE: NEVER drop the base table (_t) or base view in Production.');
                line(`-- DROP TABLE IF EXISTS \`${proj}.${C_DS}.${obj}\`;`);
                blank();
              }
              for (const src of SRC_ARR) {
                line(`DROP TABLE IF EXISTS \`${proj}.${ctrlDs}.etl_ctrl_${etlV}_${obj}_${src}\`;`);
              }
              line(`DROP TABLE IF EXISTS \`${proj}.${ctrlDs}.etl_ctrl_${etlV}_${obj}\`;`);
              blank();
              for (const src of SRC_ARR) {
                line(`DELETE FROM \`${proj}.${metaT}.table_keys\` WHERE \`table\` = '${obj}_${src}';`);
                line(`DELETE FROM \`${proj}.${metaT}.column_metadata\` WHERE table_name = '${obj}_${src}';`);
              }
              line(`DELETE FROM \`${proj}.${metaT}.table_keys\` WHERE \`table\` = '${obj}';`);
              line(`DELETE FROM \`${proj}.${metaT}.column_metadata\` WHERE table_name = '${obj}';`);
              blank();
            }

            // ── File header ─────────────────────────────────────────
            line('-- ==========================================');
            line(`-- PIPELINE : ${PIPELINE}`);
            line(`-- Request  : ${REQ_TYPE}`);
            line(`-- Mode     : ${USE_MAPPINGS ? 'Auto-generated from Column Mappings' : 'User-provided ETL View SQL'}`);
            line(`-- Stage Obj: ${STAGE_OBJ}`);
            line(`-- Core Obj : ${CORE_OBJ}`);
            line(`-- Sources  : ${SOURCES}`);
            line('-- ==========================================');
            blank();

            // ════════════════════════════════════════════════════════
            // PIPELINE: Source -> Stage  (SAP)
            // ════════════════════════════════════════════════════════
            if (PIPELINE === 'Source -> Stage') {

              // Step 1: Main Stage ETL View
              header('Main Stage ETL View');
              if (USE_MAPPINGS) {
                genSourceToStageView();
              } else {
                line(ETL_SQL);
                if (!ETL_SQL.trim().endsWith(';')) line(';');
              }
              blank();

              // Step 2: Per-source filter views
              header('Per-Source Filter Views');
              for (const src of SRC_ARR) {
                line(`CREATE OR REPLACE VIEW \`${STAGE_PROJ}.${S_ETL_V}.${STAGE_OBJ}_${src}\` AS`);
                line(`SELECT * FROM \`${STAGE_PROJ}.${S_ETL_V}.${STAGE_OBJ}\` WHERE ${SRC_COL} = '${src}';`);
                blank();
              }

              // Step 3: Table Keys
              header('Load Table Keys');
              line(`CALL \`${MAT_PROJ}.${S_DML}.auto_load_table_keys\`('${STAGE_PROJ}','${S_ETL_V}','${STAGE_OBJ}',${PK_FMT});`);
              for (const src of SRC_ARR) {
                line(`CALL \`${MAT_PROJ}.${S_DML}.auto_load_table_keys\`('${STAGE_PROJ}','${S_ETL_V}','${STAGE_OBJ}_${src}',${PK_FMT});`);
              }
              blank();

              // Step 4: Control Tables
              header('Control Table Creation');
              for (const src of SRC_ARR) {
                line(`CALL \`${MAT_PROJ}.${S_DML}.auto_create_ctrl_table\`('${STAGE_PROJ}','${S_ETL_V}','${STAGE_OBJ}_${src}','${STAGE_PROJ}','${S_DS}','${STAGE_OBJ}');`);
              }
              blank();

              // Step 5: Create stage tables
              header('Create stage_t and stage_temp_t');
              line(`CALL \`${STAGE_PROJ}.${S_DML}.sp_create_sap_core_tables\`('${STAGE_OBJ}');`);
              blank();

              // Step 6: Metadata Refresh
              header('Metadata Refresh');
              line(`CALL \`${MAT_PROJ}.${S_DML}.sp_run_mtlz_lo\`('${STAGE_PROJ}','${S_META_V}','column_metadata','${STAGE_PROJ}','${S_META_T}','column_metadata','LDUI');`);
              blank();

              // Step 7: Stage Materialization
              header('Stage Materialization');
              for (const src of SRC_ARR) {
                line(`CALL \`${MAT_PROJ}.${S_DML}.sp_run_mtlz_lo\`('${STAGE_PROJ}','${S_ETL_V}','${STAGE_OBJ}_${src}','${STAGE_PROJ}','${S_DS}','${STAGE_OBJ}','CLDUI');`);
              }
              blank();

            // ════════════════════════════════════════════════════════
            // PIPELINE: Stage -> Core  (SAP)
            // ════════════════════════════════════════════════════════
            } else if (PIPELINE === 'Stage -> Core') {

              if (REQ_TYPE !== 'New Object') {
                emitCleanup(C_ETL_V, CORE_OBJ, TARGET_PROJ, C_META_T, C_CTRL);
              }

              // Step 1: Core ETL Base View
              header('Core ETL Base View');
              if (USE_MAPPINGS) {
                genStageToCoreView();
              } else {
                line(ETL_SQL);
                if (!ETL_SQL.trim().endsWith(';')) line(';');
              }
              blank();

              // Step 2: Per-source filter views via stored proc
              header('Per-Source Filter Views (sp_create_sap_core_etl_views_src_v1)');
              line(`CALL \`${TARGET_PROJ}.${C_DML}.sp_create_sap_core_etl_views_src_v1\`('${TARGET_PROJ}','${CORE_OBJ}_base',${srcListStr});`);
              blank();

              // Step 3: Table Keys
              header('Load Table Keys');
              for (const src of SRC_ARR) {
                line(`CALL \`${MAT_PROJ}.${C_DML}.auto_load_table_keys\`('${TARGET_PROJ}','${C_ETL_V}','${CORE_OBJ}_${src}',${PK_FMT});`);
              }
              line(`CALL \`${MAT_PROJ}.${C_DML}.auto_load_table_keys\`('${TARGET_PROJ}','${C_ETL_V}','${CORE_OBJ}',${PK_FMT});`);
              blank();

              // Step 4: Control Tables
              header('Control Tables');
              for (const src of SRC_ARR) {
                line(`CALL \`${MAT_PROJ}.${C_DML}.auto_create_ctrl_table\`('${TARGET_PROJ}','${C_ETL_V}','${CORE_OBJ}_${src}','${TARGET_PROJ}','${C_DS}','${CORE_OBJ}');`);
              }
              blank();

              // Step 5: Create core_t and core_temp_t
              header('Create core_t and core_temp_t');
              line(`CALL \`${TARGET_PROJ}.${C_DML}.sp_create_sap_core_tables\`('${CORE_OBJ}_base');`);
              blank();

              // Step 6: Create Base Views
              header('Create Base Views');
              line(`CALL \`bcs-csw-materialization-dev.${C_DML}.sp_create_base_views\`('${TARGET_PROJ}','core','${CORE_OBJ}');`);
              blank();

              // Step 7: Metadata Refresh
              header('Metadata Refresh');
              line(`CALL \`${MAT_PROJ}.${C_DML}.sp_run_mtlz_lo\`('${TARGET_PROJ}','${C_META_V}','column_metadata','${TARGET_PROJ}','${C_META_T}','column_metadata','LDUI');`);
              blank();

              // Step 8: Core Materialization
              header('Core Materialization');
              for (const src of SRC_ARR) {
                line(`CALL \`${MAT_PROJ}.${C_DML}.sp_run_mtlz_lo\`('${TARGET_PROJ}','${C_ETL_V}','${CORE_OBJ}_${src}','${TARGET_PROJ}','${C_DS}','${CORE_OBJ}','CLDUI');`);
              }
              blank();

              // Step 9: Stage Base TVFs
              header('Stage Base TVFs');
              for (const src of SRC_ARR) {
                line(`CALL \`${STAGE_PROJ}.${C_DML}.sp_create_base_sap_tvf\`('${STAGE_PROJ}','sap_${src}_df_etl_v','${STAGE_OBJ}');`);
              }
              blank();

              // Step 10: Consolidated Control Table
              header('Consolidated Control Table');
              line(`CREATE OR REPLACE TABLE \`${TARGET_PROJ}.${C_CTRL}.etl_ctrl_${C_ETL_V}_${CORE_OBJ}\` AS`);
              SRC_ARR.forEach((src, idx) => {
                if (idx > 0) line('UNION ALL');
                line(`SELECT * FROM \`${TARGET_PROJ}.${C_CTRL}.etl_ctrl_${C_ETL_V}_${CORE_OBJ}_${src}\``);
              });
              line(';');
              blank();

              // Step 11: TVF Materialization (Airflow DAG Call)
              header('TVF Materialization');
              line('--Airflow DAG Call--');
              blank();
              line(`CALL \`${MAT_PROJ}.${C_DML}.sp_run_mtlz_cldui_tvf_sap\`('${TARGET_PROJ}','${C_ETL_V}','${CORE_OBJ}','${TARGET_PROJ}','${C_DS}','${CORE_OBJ}',${srcListStr});`);
              blank();

              line('-- =======================');
              line('-- VERIFICATION QUERIES');
              line('-- =======================');
              line(`-- SELECT ${SRC_COL}, COUNT(*) FROM \`${TARGET_PROJ}.${C_DS}.${CORE_OBJ}\` GROUP BY 1;`);
              line(`-- SELECT * FROM \`${TARGET_PROJ}.log.etl_log\` WHERE source_tablename = '${CORE_OBJ}' ORDER BY run_tsp DESC LIMIT 10;`);
              blank();

            // ════════════════════════════════════════════════════════
            // PIPELINE: Source -> Stage SFDC
            // ════════════════════════════════════════════════════════
            } else if (PIPELINE === 'Source -> Stage SFDC') {

              // Step 1: Main SFDC Stage ETL View
              header('Main SFDC Stage ETL View');
              if (USE_MAPPINGS) {
                genSourceToStageSfdcView();
              } else {
                line(ETL_SQL);
                if (!ETL_SQL.trim().endsWith(';')) line(';');
              }
              blank();

              // Step 2: Per-source filter views
              header('Per-Source Filter Views');
              for (const src of SRC_ARR) {
                line(`CREATE OR REPLACE VIEW \`${STAGE_PROJ}.${SF_ETL_V}.${STAGE_OBJ}_${src}\` AS`);
                line(`SELECT * FROM \`${STAGE_PROJ}.${SF_ETL_V}.${STAGE_OBJ}\` WHERE ${SRC_COL} = '${src}';`);
                blank();
              }

              // Step 3: Table Keys
              header('Load Table Keys');
              line(`CALL \`${MAT_PROJ}.${SF_DML}.auto_load_table_keys\`('${STAGE_PROJ}','${SF_ETL_V}','${STAGE_OBJ}',${PK_FMT});`);
              for (const src of SRC_ARR) {
                line(`CALL \`${MAT_PROJ}.${SF_DML}.auto_load_table_keys\`('${STAGE_PROJ}','${SF_ETL_V}','${STAGE_OBJ}_${src}',${PK_FMT});`);
              }
              blank();

              // Step 4: Control Tables
              header('Control Table Creation');
              for (const src of SRC_ARR) {
                line(`CALL \`${MAT_PROJ}.${SF_DML}.auto_create_ctrl_table\`('${STAGE_PROJ}','${SF_ETL_V}','${STAGE_OBJ}_${src}','${STAGE_PROJ}','${SF_DS}','${STAGE_OBJ}');`);
              }
              blank();

              // Step 5: Create SFDC Stage Tables
              header('Create SFDC Stage Tables');
              line(`CALL \`${STAGE_PROJ}.${SF_DML}.sp_create_sap_core_tables\`('${STAGE_OBJ}');`);
              blank();

              // Step 6: Metadata Refresh
              header('Metadata Refresh');
              line(`CALL \`${MAT_PROJ}.${SF_DML}.sp_run_mtlz_lo\`('${STAGE_PROJ}','${SF_META_V}','column_metadata','${STAGE_PROJ}','${SF_META_T}','column_metadata','LDUI');`);
              blank();

              // Step 7: SFDC Stage Materialization
              header('SFDC Stage Materialization');
              for (const src of SRC_ARR) {
                line(`CALL \`${MAT_PROJ}.${SF_DML}.sp_run_mtlz_lo\`('${STAGE_PROJ}','${SF_ETL_V}','${STAGE_OBJ}_${src}','${STAGE_PROJ}','${SF_DS}','${STAGE_OBJ}','CLDUI');`);
              }
              blank();

            // ════════════════════════════════════════════════════════
            // PIPELINE: Stage SFDC -> SFDC Core
            // ════════════════════════════════════════════════════════
            } else if (PIPELINE === 'Stage SFDC -> SFDC Core') {

              if (REQ_TYPE !== 'New Object') {
                emitCleanup(C_ETL_V, CORE_OBJ, TARGET_PROJ, C_META_T, C_CTRL);
              }

              // Step 1: Core ETL View
              header('Core ETL View');
              if (USE_MAPPINGS) {
                genStageSfdcToCoreView();
              } else {
                line(ETL_SQL);
                if (!ETL_SQL.trim().endsWith(';')) line(';');
              }
              blank();

              // Step 2: Per-source filter views
              header('Per-Source Filter Views');
              for (const src of SRC_ARR) {
                line(`CREATE OR REPLACE VIEW \`${TARGET_PROJ}.${C_ETL_V}.${CORE_OBJ}_${src}\` AS`);
                line(`SELECT * FROM \`${TARGET_PROJ}.${C_ETL_V}.${CORE_OBJ}\` WHERE ${SRC_COL} = '${src}';`);
                blank();
              }

              // Step 3: Table Keys
              header('Load Table Keys');
              line(`CALL \`${MAT_PROJ}.${C_DML}.auto_load_table_keys\`('${TARGET_PROJ}','${C_ETL_V}','${CORE_OBJ}',${PK_FMT});`);
              for (const src of SRC_ARR) {
                line(`CALL \`${MAT_PROJ}.${C_DML}.auto_load_table_keys\`('${TARGET_PROJ}','${C_ETL_V}','${CORE_OBJ}_${src}',${PK_FMT});`);
              }
              blank();

              // Step 4: Control Tables
              header('Control Tables');
              for (const src of SRC_ARR) {
                line(`CALL \`${MAT_PROJ}.${C_DML}.auto_create_ctrl_table\`('${TARGET_PROJ}','${C_ETL_V}','${CORE_OBJ}_${src}','${TARGET_PROJ}','${C_DS}','${CORE_OBJ}');`);
              }
              blank();

              // Step 5: Create core_t and core_temp_t
              header('Create core_t and core_temp_t');
              line(`CALL \`${TARGET_PROJ}.${C_DML}.sp_create_sap_core_tables\`('${CORE_OBJ}');`);
              blank();

              // Step 6: Create Base Views
              header('Create Base Views');
              line(`CALL \`bcs-csw-materialization-dev.${C_DML}.sp_create_base_views\`('${TARGET_PROJ}','core','${CORE_OBJ}');`);
              blank();

              // Step 7: Metadata Refresh
              header('Metadata Refresh');
              line(`CALL \`${MAT_PROJ}.${C_DML}.sp_run_mtlz_lo\`('${TARGET_PROJ}','${C_META_V}','column_metadata','${TARGET_PROJ}','${C_META_T}','column_metadata','LDUI');`);
              blank();

              // Step 8: Core Materialization
              header('Core Materialization');
              for (const src of SRC_ARR) {
                line(`CALL \`${MAT_PROJ}.${C_DML}.sp_run_mtlz_lo\`('${TARGET_PROJ}','${C_ETL_V}','${CORE_OBJ}_${src}','${TARGET_PROJ}','${C_DS}','${CORE_OBJ}','CLDUI');`);
              }
              blank();

              line('-- =======================');
              line('-- VERIFICATION QUERIES');
              line('-- =======================');
              line(`-- SELECT ${SRC_COL}, COUNT(*) FROM \`${TARGET_PROJ}.${C_DS}.${CORE_OBJ}\` GROUP BY 1;`);
              line(`-- SELECT * FROM \`${TARGET_PROJ}.log.etl_log\` WHERE source_tablename = '${CORE_OBJ}' ORDER BY run_tsp DESC LIMIT 10;`);
              blank();

            // ════════════════════════════════════════════════════════
            // ALL OTHER PIPELINES — steps coming soon
            // ════════════════════════════════════════════════════════
            } else {
              line(`-- Pipeline "${PIPELINE}" is registered.`);
              line('-- Automated SQL generation for this pipeline type is not yet implemented.');
              line('-- Steps will be added in a future release.');
              line('-- Please use /execute with your manual SQL to proceed.');
              blank();
            }

            fs.writeFileSync('/tmp/generated_sql.sql', sql);
            console.log('=== Full Generated SQL ===');
            console.log(sql);

      - name: Post SQL for review
        uses: actions/github-script@v7
        env:
          PIPELINE:     ${{ steps.parse.outputs.pipeline }}
          REQ_TYPE:     ${{ steps.parse.outputs.request_type }}
          STAGE_OBJ:    ${{ steps.parse.outputs.stage_obj }}
          CORE_OBJ:     ${{ steps.parse.outputs.core_obj }}
          STAGE_PROJ:   ${{ steps.parse.outputs.stage_proj }}
          TARGET_PROJ:  ${{ steps.parse.outputs.target_proj }}
          MAT_PROJ:     ${{ steps.parse.outputs.mat_proj }}
          SOURCE_TYPES: ${{ steps.parse.outputs.source_types }}
          PKS:          ${{ steps.parse.outputs.pks }}
        with:
          script: |
            const fs = require('fs');
            let sql = '';
            try {
              sql = fs.readFileSync('/tmp/generated_sql.sql', 'utf8');
            } catch (e) {
              sql = 'ERROR: Failed to read generated SQL file.';
            }

            const pipeline       = process.env.PIPELINE     || '';
            const reqType        = process.env.REQ_TYPE      || '';
            const stageObj       = process.env.STAGE_OBJ     || '';
            const coreObj        = process.env.CORE_OBJ      || '';
            const stageProj      = process.env.STAGE_PROJ    || '';
            const targetProj     = process.env.TARGET_PROJ   || '';
            const matProj        = process.env.MAT_PROJ      || '';
            const sourceTypes    = process.env.SOURCE_TYPES  || '';
            const pks            = process.env.PKS           || '';
            const notImplemented = sql.includes('not yet implemented');

            const body =
              `## Generated Materialization SQL\n\n` +
              `| Field | Value |\n|---|---|\n` +
              `| **Pipeline** | ${pipeline} |\n` +
              `| **Request Type** | ${reqType} |\n` +
              `| **Stage Object** | \`${stageObj}\` |\n` +
              `| **Core Object** | \`${coreObj}\` |\n` +
              `| **Stage Project** | \`${stageProj}\` |\n` +
              `| **Target Project** | \`${targetProj}\` |\n` +
              `| **Mat Project** | \`${matProj}\` |\n` +
              `| **Source Types** | ${sourceTypes} |\n` +
              `| **Primary Keys** | ${pks} |\n\n` +
              (notImplemented
                ? `> ⚠️ **SQL generation for \`${pipeline}\` is not yet automated.** ` +
                  `Please use \`/execute\` with your SQL in a code block to proceed manually.\n\n`
                : '') +
              `### Review the SQL below\n\n` +
              `\`\`\`sql\n${sql}\n\`\`\`\n\n` +
              `---\n` +
              `**Actions:**\n\n` +
              `| Action | Command |\n|---|---|\n` +
              `| Execute as-is | Comment \`/approve\` |\n` +
              `| Execute edited SQL | Comment \`/execute\` with your corrected SQL in a code block |\n` +
              `| Cancel | Comment \`/reject\` and close the issue |\n`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: body
            });

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              labels: ['status:awaiting-review']
            });

  # ================================================================
  #  JOB 2 - EXECUTE SQL on /approve or /execute
  # ================================================================
  execute:
    name: "Execute SQL"
    if: >-
      github.event_name == 'issue_comment' &&
      contains(github.event.issue.labels.*.name, 'type:materialization') &&
      (startsWith(github.event.comment.body, '/approve') ||
       startsWith(github.event.comment.body, '/execute'))
    runs-on: ubuntu-latest  # TEST: changed from self-hosted

    steps:
      - name: Parse inputs
        id: parse
        uses: actions/github-script@v7
        with:
          script: |
            const comment  = context.payload.comment.body;
            const issueBody = context.payload.issue.body;

            function extract(label) {
              const re = new RegExp(`###\\s*${label}\\s*\\n\\n([^#]*?)(?=\\n###|$)`, 'is');
              const m = issueBody.match(re);
              return m ? m[1].trim() : '';
            }

            core.setOutput('pipeline',    extract('Pipeline Type'));
            core.setOutput('stage_proj',  extract('Stage Project Name'));
            core.setOutput('target_proj', extract('Target Project Name'));
            core.setOutput('mat_proj',    extract('Materialization Project'));
            core.setOutput('stage_obj',   extract('Source\\/Stage Object Name'));
            core.setOutput('core_obj',    extract('Core\\/Target Object Name'));
            core.setOutput('src_col',     extract('Source Type Column Name'));

            if (comment.startsWith('/execute')) {
              const sqlMatch = comment.match(/```(?:sql)?\s*\n([\s\S]*?)```/);
              if (sqlMatch) {
                core.setOutput('mode', 'custom');
                const fs = require('fs');
                fs.writeFileSync('/tmp/custom_sql.txt', sqlMatch[1].trim());
              } else {
                core.setFailed('No SQL code block found in /execute comment. Wrap your SQL in ``` blocks.');
              }
            } else {
              core.setOutput('mode', 'approve');
            }

      # TEST: GCP auth disabled for personal repo testing
      # - name: Authenticate to Google Cloud
      #   uses: google-github-actions/auth@v2
      #   with:
      #     workload_identity_provider: "projects/911179317008/..."
      #     service_account: "sa-wif-ghactions@bcs-csw-core-np.iam.gserviceaccount.com"
      # - name: Setup gcloud
      #   uses: google-github-actions/setup-gcloud@v2

      - name: Get SQL to execute
        id: sql
        run: |
          MODE="${{ steps.parse.outputs.mode }}"
          if [ "${MODE}" = "custom" ]; then
            cp /tmp/custom_sql.txt /tmp/to_execute.sql
          else
            echo "Fetching generated SQL from issue comments..."
            gh api \
              "/repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/comments" \
              --jq '.[] | select(.body | contains("Generated Materialization SQL")) | .body' \
              > /tmp/comment.txt
            sed -n '/```sql/,/```/p' /tmp/comment.txt | sed '1d;$d' > /tmp/to_execute.sql
          fi
          echo "=== SQL to execute ==="
          cat /tmp/to_execute.sql
        env:
          GH_TOKEN: ${{ github.token }}

      # TEST: Dry-run mode — prints each SQL statement instead of running bq query
      - name: Execute SQL statements (DRY RUN)
        id: exec
        run: |
          RESULTS=""
          STEP=0

          while IFS= read -r stmt; do
            [ -z "$(echo "$stmt" | tr -d '[:space:]')" ] && continue
            echo "$stmt" | grep -qE '^\s*--' && continue

            STEP=$((STEP + 1))
            echo ""
            echo "=== Step ${STEP} (DRY RUN) ==="
            echo "${stmt}"
            RESULTS="${RESULTS}| ${STEP} | ✅ Dry-run OK | 0s |\n"
          done < <(awk 'BEGIN{RS=";"}{gsub(/^\n+|\n+$/,""); if(NF) print}' /tmp/to_execute.sql)

          printf "${RESULTS}" > /tmp/results.txt
          echo "Dry-run complete — $STEP statements parsed."

      # TEST: Verify step skipped — no BQ access in personal repo
      - name: Verify — sample data (SKIPPED IN TEST)
        id: verify
        if: success()
        run: |
          echo "Verify step skipped in test mode (no BQ access)." > /tmp/samples.txt

      - name: Post results
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const success = '${{ steps.exec.outcome }}' === 'success';
            const status  = success ? 'COMPLETED ✅' : 'FAILED ❌';

            let results = '';
            try { results = fs.readFileSync('/tmp/results.txt', 'utf8'); } catch(e) {}
            let samples = '';
            try { samples = fs.readFileSync('/tmp/samples.txt', 'utf8'); } catch(e) {}

            const body =
              `## Materialization ${status}\n\n` +
              `### Execution Results\n` +
              `| Step | Status | Duration |\n|---|---|---|\n` +
              results + '\n' +
              (samples ? `\n### Sample Data (LIMIT 5)\n${samples}` : '') +
              `\n\n[View full logs](${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID})`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: body
            });

            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: context.payload.issue.number,
                name: 'status:awaiting-review'
              });
            } catch(e) {}

            await github.rest.issues.addLabels({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              labels: [success ? 'status:completed' : 'status:failed']
            });

            if (success) {
              await github.rest.issues.update({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: context.payload.issue.number,
                state: 'closed'
              });
            }

  # ================================================================
  #  JOB 3 - REJECT
  # ================================================================
  reject:
    name: "Reject Request"
    if: >-
      github.event_name == 'issue_comment' &&
      contains(github.event.issue.labels.*.name, 'type:materialization') &&
      startsWith(github.event.comment.body, '/reject')
    runs-on: ubuntu-latest

    steps:
      - name: Close issue as rejected
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: context.payload.issue.number,
                name: 'status:awaiting-review'
              });
            } catch(e) {}

            await github.rest.issues.addLabels({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              labels: ['status:rejected']
            });

            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: '## Request Rejected\n\nThis materialization request has been rejected and the issue has been closed.'
            });

            await github.rest.issues.update({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              state: 'closed'
            });
